// Parser CSV
function parseCSVText(text) {
  var rows = [], row = [], cell = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c !== '\r') { cell += c; }
    }
  }
  if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
  return rows;
}

function csvRowsToDias(rows) {
  var diasMap = {}, diasOrder = [];
  var split = function(s) {
    if (!s || !s.trim()) return [];
    return s.split('|').map(function(x){ return x.trim(); }).filter(Boolean);
  };
  // Asumimos que la fila 0 es encabezado
  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    if (!r || !r[0] || !r[1]) continue;
    var diaId = r[1].trim();
    if (!diasMap[diaId]) {
      diasMap[diaId] = {
        id: diaId,
        fecha: r[0].trim(),
        etiqueta: (r[2] || '').trim(),
        resumen_dia: (r[3] || '').trim(),
        comidas: []
      };
      diasOrder.push(diaId);
    }
    diasMap[diaId].comidas.push({
      id: (r[4] || '').trim(),
      titulo: (r[5] || '').trim(),
      hora: (r[6] || '').trim(),

        atencion:    split(r[10]),
        contexto:    split(r[11]),
        suplementos: split(r[12])
      },
      nota: (r[13] && r[13].trim()) ? r[13].trim() : null
    });
  }
  return diasOrder.map(function(id){ return diasMap[id]; });
}

  omega3_capsula: { label: "Omega-3 Nutrilite · 1 cáp", cat: "suplemento"},

const DATA = {
  meta: { semana: 1, periodo: "Abril 2026", version: "v19", actualizado: "En vivo" },
  dias: []
};

function parseCSVText(text) {
  var rows = [], row = [], cell = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c !== '\r') { cell += c; }
    }
  }
  if (cell !== '' || row.length > 0) { row.push(cell); row.push(cell); rows.push(row); }
  return rows;
}

function csvRowsToDias(rows) {
  var diasMap = {}, diasOrder = [];
  var split = function(s) {
    if (!s || !s.trim()) return [];
    return s.split('|').map(function(x){ return x.trim(); }).filter(Boolean);
  };
  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    if (!r || !r[0] || !r[1]) continue;
    var diaId = r[1].trim();
    if (!diasMap[diaId]) {
      diasMap[diaId] = { id: diaId, fecha: r[0].trim(), etiqueta: (r[2] || '').trim(), resumen_dia: (r[3] || '').trim(), comidas: [] };
      diasOrder.push(diaId);
    }
    diasMap[diaId].comidas.push({
      id: (r[4] || '').trim(),
      titulo: (r[5] || '').trim(),
      hora: (r[6] || '').trim(),
      icono: (r[7] || '🍽️').trim(),
      alimentos: split(r[8]),
      tags: { cubierto: split(r[9]), atencion: split(r[10]), contexto: split(r[11]), suplementos: split(r[12]) },
      nota: (r[13] && r[13].trim()) ? r[13].trim() : null
    });
  }
  return diasOrder.map(function(id){ return diasMap[id]; });
}

async function cargarRegistros() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="empty-state"><span>⏳</span>Cargando datos...</div>';
  try {
    const res = await fetch(SHEET_CSV_PUB);
    const text = await res.text();
    const rows = parseCSVText(text);
    DATA.dias = csvRowsToDias(rows);
    if (DATA.dias.length > 0) {
      document.getElementById("hero-meta").textContent = "Última entrada: " + DATA.dias[DATA.dias.length-1].fecha;
      document.getElementById("hero-tag").textContent = "Registro Activo";
    }
    return true;
  } catch(e) {
    app.innerHTML = '<div class="empty-state"><span>⚠️</span>Error de conexión.</div>';
    return false;
  }
}

function labelTag(key) { return TAG_CATALOG[key] ? TAG_CATALOG[key].label : key; }
function renderTags(arr, cls) { return (arr || []).map(t => '<span class="tag ' + cls + '">' + labelTag(t) + '</span>').join(""); }

function renderComida(c) {
  var alimentos = c.alimentos.map(a => '<div class="food-item"><div class="food-dot"></div>' + a + '</div>').join("");
  var secciones = "";
  if (c.tags.cubierto.length > 0) secciones += '<div class="tag-section-title">Cubierto</div><div class="tag-grid">' + renderTags(c.tags.cubierto, "ok") + "</div>";
  if (c.tags.atencion.length > 0) secciones += '<div class="tag-section-title">Atención</div><div class="tag-grid">' + renderTags(c.tags.atencion, "warn") + "</div>";
  if (c.tags.contexto.length > 0) secciones += '<div class="tag-section-title">Contexto</div><div class="tag-grid">' + renderTags(c.tags.contexto, "ctx") + "</div>";
  if (c.tags.suplementos.length > 0) secciones += '<div class="tag-section-title">Suplementos</div><div class="tag-grid">' + renderTags(c.tags.suplementos, "purple") + "</div>";
  var nota = c.nota ? '<div class="note">' + c.nota + "</div>" : "";
  return '<div class="meal-card"><div class="meal-header" onclick="toggle(this)"><div class="meal-header-left"><div class="meal-icon">' + c.icono + "</div><div><div class="meal-title">' + c.titulo + '</div><div class="meal-time">' + c.hora + "</div></div></div><div class="meal-chevron">&#x25BC;</div></div><div class="meal-body">' + alimentos + nota + secciones + '</div></div>';
}

function renderDia(dia) {
  var comidas = dia.comidas.map(renderComida).join("");
  return '<div id="' + dia.id + '" class="day-section"><div class="section-header"><h2>' + dia.etiqueta + '</h2><div class="section-line"></div></div><div class="day-label"><div class="day-dot"></div>' + dia.resumen_dia + "</div>" + comidas + "</div>";
}

function toggle(h) { h.parentElement.classList.toggle("open"); }

var appState = { view: "dia", diaId: null };

function updateView() {
  const app = document.getElementById("app");
  if (appState.view === "dia") {
    var dia = DATA.dias.find(d => d.id === appState.diaId);
    app.innerHTML = dia ? renderDia(dia) : '<div class="empty-state">No hay datos para hoy</div>';
  } else {
    app.innerHTML = '<div class="empty-state">Vista en desarrollo</div>';
  }
}

window.onload = async function() {
  const ok = await cargarRegistros();
  if (ok && DATA.dias.length > 0) {
    appState.diaId = DATA.dias[DATA.dias.length-1].id;
    updateView();
  }
};
