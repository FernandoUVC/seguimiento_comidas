<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-app.js';
import { getDatabase, ref, get, set, child } from 'https://www.gstatic.com/firebasejs/11.8.1/firebase-database.js';

  apiKey: "AIzaSyBqnZslitqXoS0g3NtoT5PnNnTQ5KYxSzw",
  authDomain: "nutrilog-fernando.firebaseapp.com",
  databaseURL: "https://nutrilog-fernando-default-rtdb.firebaseio.com",
  projectId: "nutrilog-fernando",
  storageBucket: "nutrilog-fernando.firebasestorage.app",

  appId: "1:875790970031:web:cccab64f9ff6aba3d6b85a"
});
const _fbDB = getDatabase(_fbApp);
window._fbGet = (path) => get(ref(_fbDB, path)).then(s => s.val());

<style>
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2435;--border:#2a3045;--text:#e8eaf0;--muted:#6b7280;--green:#4ade80;--green-bg:#052e16;--yellow:#fbbf24;--yellow-bg:#1c1400;--red:#f87171;--red-bg:#2d0a0a;--blue:#60a5fa;--blue-bg:#0a1628;--purple:#c084fc;--purple-bg:#1a0a2e;--orange:#fb923c;--accent:#4ade80;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;}
.hero{background:linear-gradient(135deg,#0f1117 0%,#1a2440 50%,#0f1117 100%);border-bottom:1px solid var(--border);padding:2.5rem 1.25rem 2rem;text-align:center;}
.hero p{color:var(--muted);font-size:13px;}
.download-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);color:var(--green);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;margin-top:1.2rem;transition:all .2s;font-family:'DM Sans',sans-serif;}
.download-btn:hover{background:rgba(74,222,128,.2);}
.nav-scroll{overflow-x:auto;display:flex;gap:8px;padding:1rem 1.25rem;border-bottom:1px solid var(--border);scrollbar-width:none;background:var(--surface);position:sticky;top:0;z-index:100;}
.nav-scroll::-webkit-scrollbar{display:none;}
.nav-pill{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;}
.nav-pill:hover,.nav-pill.active{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);color:var(--green);}
main{padding:1.25rem;max-width:680px;margin:0 auto;}
.section-header{display:flex;align-items:center;gap:10px;margin:2rem 0 1rem;}
.section-header h2{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600;color:#fff;}
.section-line{flex:1;height:1px;background:var(--border);}
.context-grid{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem;}
.context-row{display:grid;grid-template-columns:1fr 2fr;border-bottom:1px solid var(--border);}
.context-row:last-child{border-bottom:none;}
.context-cell{padding:10px 14px;font-size:13px;}
.context-cell:first-child{border-right:1px solid var(--border);color:var(--muted);font-weight:500;}
.day-section{margin-bottom:2.5rem;}
.day-label{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted);margin-bottom:1rem;font-weight:500;}
.day-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1rem;}
.meal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.meal-header-left{display:flex;align-items:center;gap:10px;}
.meal-icon{font-size:1.2rem;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:8px;flex-shrink:0;}
.meal-title{font-weight:500;font-size:14px;color:#fff;}
.meal-time{font-size:11px;color:var(--muted);margin-top:1px;}
.meal-chevron{color:var(--muted);font-size:12px;transition:transform .3s;}
.meal-card.open .meal-chevron{transform:rotate(180deg);}
.meal-body{display:none;padding:14px 16px;}
.meal-card.open .meal-body{display:block;}
.food-list{margin-bottom:1rem;}
.food-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);}
.food-item:last-child{border-bottom:none;}
.food-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px;flex-shrink:0;}
.tag-section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:12px 0 8px;}
.tag-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;}
.tag.ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(74,222,128,.2);}
.tag.warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.2);}
.tag.bad{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.tag.purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(192,132,252,.2);}
.tag.ctx{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.note{background:rgba(251,191,36,.06);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:var(--muted);margin:10px 0;}
.note.good{background:rgba(74,222,128,.06);border-color:var(--green);}
.note.info{background:rgba(96,165,250,.06);border-color:var(--blue);}
.resumen-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem;}
.resumen-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.resumen-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
.resumen-cat{font-weight:500;font-size:13px;}
.resumen-days{display:flex;gap:5px;flex-wrap:wrap;}
.resumen-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-gray{background:var(--surface2);color:var(--muted);}
.auto-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05);}
.stat-pill{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.stat-pill.red{background:rgba(248,113,113,.08);color:var(--red);border-color:rgba(248,113,113,.2);}
.stat-pill.green{background:rgba(74,222,128,.08);color:var(--green);border-color:rgba(74,222,128,.2);}
.stat-pill.yellow{background:rgba(251,191,36,.08);color:var(--yellow);border-color:rgba(251,191,36,.2);}
.alert-list{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem;}
.alert-item{display:flex;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;}
.alert-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
.alert-text strong{display:block;font-weight:500;margin-bottom:2px;}
.alert-text span{color:var(--muted);font-size:12px;}
.consejo-list{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem;}
.consejo-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;display:flex;gap:10px;}
.consejo-emoji{font-size:1.1rem;flex-shrink:0;}
footer{text-align:center;padding:2rem 1.25rem;border-top:1px solid var(--border);color:var(--muted);font-size:12px;}
.secondary-nav{overflow-x:auto;display:flex;gap:6px;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);scrollbar-width:none;background:var(--surface);position:sticky;top:0;z-index:50;align-items:center;}
.secondary-nav::-webkit-scrollbar{display:none;}
.nav-divider{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 2px;}
.sec-pill{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;font-family:'DM Sans',sans-serif;}
.sec-pill:hover,.sec-pill.active{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);color:var(--green);}
.cal-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.25rem 1.2rem;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;}
.cal-mes{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:#fff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:320px;margin:0 auto;}
.cal-dayname{text-align:center;font-size:10px;font-weight:500;color:var(--muted);padding:2px 0;letter-spacing:.06em;text-transform:uppercase;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:12px;font-weight:500;color:var(--surface2);}
.cal-day.has-data{background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;}
.cal-day.has-data:hover{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.35);color:var(--green);}
.cal-day.selected{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.55);color:var(--green);font-weight:700;}
.empty-state{text-align:center;padding:3rem 1.25rem;color:var(--muted);font-size:13px;}
.empty-state span{font-size:2rem;display:block;margin-bottom:.75rem;opacity:.4;}
.cal-arrow{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1.3rem;line-height:1;transition:all .2s;}
.cal-arrow:hover{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);color:var(--green);}
.cal-arrow:disabled{opacity:.25;cursor:default;}

/* ── REGISTRO FORM ── */
#registro-view{padding:0;}
.registro-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.5rem;}
.registro-form-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.registro-form-header .form-icon{width:34px;height:34px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.registro-form-header .form-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:#fff;}
.registro-form-header .form-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.registro-form-body{padding:18px;}
.csv-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;display:block;}
.csv-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',monospace;font-size:12px;padding:12px 14px;resize:vertical;min-height:90px;line-height:1.5;transition:border-color .2s;outline:none;}
.csv-textarea:focus{border-color:rgba(74,222,128,.5);box-shadow:0 0 0 3px rgba(74,222,128,.07);}
.csv-textarea::placeholder{color:var(--muted);opacity:.6;}
.csv-hint{margin-top:8px;font-size:11px;color:var(--muted);line-height:1.5;}
.csv-hint code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:monospace;color:#93c5fd;font-size:10px;}
.form-actions{display:flex;align-items:center;gap:10px;margin-top:14px;}
.btn-submit{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.4);color:var(--green);padding:10px 22px;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:7px;}
.btn-submit:hover{background:rgba(74,222,128,.25);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
.btn-clear{background:none;border:1px solid var(--border);color:var(--muted);padding:10px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-clear:hover{border-color:rgba(248,113,113,.4);color:var(--red);}
.btn-revisar{background:#60a5fa22;color:#60a5fa;border:1px solid #60a5fa44;padding:10px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-revisar:hover{background:#60a5fa33;border-color:#60a5fa66;}
.form-status{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px;display:none;}
.form-status.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);color:var(--green);display:flex;gap:8px;align-items:flex-start;}
.form-status.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--red);display:flex;gap:8px;align-items:flex-start;}
.form-status.sending{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);color:var(--blue);display:flex;gap:8px;align-items:center;}
.registro-tips{display:flex;flex-direction:column;gap:8px;}
.tip-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--muted);display:flex;gap:9px;align-items:flex-start;}
.tip-card .tip-icon{flex-shrink:0;font-size:.95rem;margin-top:1px;}
/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(96,165,250,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
/* ── BOTTOM NAV ── */
body{padding-bottom:70px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(24,28,39,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:flex-end;padding:10px 6px 12px;z-index:150;box-shadow:0 -4px 20px rgba(0,0,0,.3);}
.bottom-nav-item{background:none;border:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;justify-content:flex-end;font-family:'DM Sans',sans-serif;font-size:9px;font-weight:500;cursor:pointer;flex:1;gap:4px;transition:color .2s;padding:0;min-height:48px;}
.bottom-nav-item .nav-icon{font-size:1.4rem;line-height:1;transition:transform .2s;}
.bottom-nav-item.active .nav-icon{transform:translateY(-2px);}
.bottom-nav-item.active{color:var(--green);font-weight:700;}

.ia-msg-bot{background:var(--surface2);border:1px solid var(--border);border-radius:12px 12px 12px 4px;padding:10px 14px;font-size:13px;color:var(--text);max-width:85%;align-self:flex-start;}
.ia-msg-user{background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.25);border-radius:12px 12px 4px 12px;padding:10px 14px;font-size:13px;color:var(--text);max-width:85%;align-self:flex-end;}
.ia-msg-typing{background:var(--surface2);border:1px solid var(--border);border-radius:12px 12px 12px 4px;padding:10px 14px;font-size:13px;color:var(--muted);align-self:flex-start;}

#revisar-panel { padding-bottom: 80px; max-height: calc(100vh - 60px); }
#revisar-overlay { z-index: 300; }
#ia-chat-overlay { z-index: 300; }
#revisar-panel { z-index: 301; }
.rv-modal { z-index: 302; }
.bottom-nav { z-index: 150; }
</style>
</head>
<body>

<div class="hero" style="padding:1rem 1.25rem;text-align:center;">
  <h1 style="font-family:'Fraunces',serif;font-size:1.8rem;font-weight:600;color:#fff;margin-bottom:.25rem;">Registro Nutricional</h1>
  <div id="hero-fecha" style="font-size:13px;color:var(--muted);font-family:'DM Sans',sans-serif;"></div>
  <a class="download-btn" href="#" onclick="exportCSV();return false;" style="margin-top:.75rem;">&#x2B07; Exportar CSV</a>
</div>
  
<nav class="secondary-nav">
  <button class="sec-pill" data-view="semana">Semana</button>
  <button class="sec-pill" data-view="mes">Mes</button>
  <div class="nav-divider"></div>
  <button class="sec-pill" data-view="contexto">Contexto</button>
</nav>
  
<div class="cal-wrap" id="cal-wrap">
  <div class="cal-header"><button class="cal-arrow" id="cal-prev" onclick="calNavMes(-1)">&#x2039;</button><span class="cal-mes" id="cal-mes-label"></span><button class="cal-arrow" id="cal-next" onclick="calNavMes(1)">&#x203A;</button></div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<main id="app"></main>

<footer>
  <p>Registro Nutricional &middot; Proyecto Resourcefulness &middot; · Google Sheets</p>
  <nav class="bottom-nav">
  <button class="bottom-nav-item active" onclick="bottomNav(this,'dia')">
    <span class="nav-icon">📊</span>
    <span>Dashboard</span>
  </button>
  <button class="bottom-nav-item" onclick="bottomNav(this,'alertas')">
    <span class="nav-icon">⚠️</span>
    <span>Alertas</span>
  </button>
  <button class="bottom-nav-item" onclick="bottomNav(this,'consejos')">
    <span class="nav-icon">💡</span>
    <span>Consejos</span>
  </button>
  <button class="bottom-nav-item" onclick="bottomNav(this,'analisis')">
    <span class="nav-icon">🔍</span>
    <span>Análisis</span>
  </button>
  <button class="bottom-nav-item" onclick="bottomNav(this,'registro')">
    <span class="nav-icon">✏️</span>
    <span>Añadir</span>
  </button>
</nav>
</footer>

<script>

async function submitGForm() {
  var csv = document.getElementById('csv-input').value.trim();
  if (!csv) { showFormStatus('err', '⚠️ Pega el CSV antes de enviar.'); return; }
  var cols = csv.split(',');
  if (cols.length < 5) { showFormStatus('err', '⚠️ CSV inválido — revisa el formato.'); return; }
  showFormStatus('sending', 'Guardando en Firebase…');
  document.getElementById('btn-submit').disabled = true;
  document.getElementById('btn-submit').textContent = 'Guardando…';
  try {
    var fecha   = cols[0].trim();
    var diaId   = cols[1].trim();
    var partes  = fecha.split('-');
    var anio    = partes[0];
    var mes     = partes[1];
    var comidaId = (cols[4] || '').trim().replace(/[.#$/\[\]]/g,'_') || diaId + '_cx';
    function splitPipe(s){ return s ? s.split('|').map(function(x){return x.trim();}).filter(Boolean) : []; }
    var comida = {
      titulo:    (cols[5]||'').trim(),
      hora:      (cols[6]||'').trim(),
      icono:     (cols[7]||'🍽️').trim(),
      alimentos: splitPipe(cols[8]),
      tags: {
        cubierto:    splitPipe(cols[9]),
        atencion:    splitPipe(cols[10]),
        contexto:    splitPipe(cols[11]),
        suplementos: splitPipe(cols[12])
      },
      nota: (cols[13]||'').trim()
    };
    // Escribe o actualiza la comida
    await window._fbSet('registros/' + anio + '/' + mes + '/' + diaId + '/comidas/' + comidaId, comida);
    // Escribe meta del día (no sobreescribe si ya existe)
    var metaExistente = await window._fbGet('registros/' + anio + '/' + mes + '/' + diaId + '/meta');
    if (!metaExistente) {
      var d = new Date(fecha + 'T12:00:00');
      var dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
      var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      var etiqueta = dias[d.getDay()] + ' ' + d.getDate() + ' de ' + meses[d.getMonth()];
      await window._fbSet('registros/' + anio + '/' + mes + '/' + diaId + '/meta', {
        fecha: fecha, dia_id: diaId, etiqueta: etiqueta, resumen_dia: (cols[3]||'').trim()
      });
    }
    showFormStatus('ok', '✅ Guardado en Firebase. Recarga la vista Día para verlo.');
    document.getElementById('csv-input').value = '';
    document.getElementById('btn-submit').disabled = false;
    document.getElementById('btn-submit').textContent = '↑ Enviar';
  } catch(e) {
    showFormStatus('err', '⚠️ Error al guardar: ' + e.message);
    document.getElementById('btn-submit').disabled = false;
    document.getElementById('btn-submit').textContent = '↑ Enviar';
  }
}

function parseCSVText(text) {
  var rows = [], row = [], cell = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c !== '\r') { cell += c; }
    }
  }
  if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
  return rows;
}

function csvRowsToDias(rows) {
  var diasMap = {}, diasOrder = [];
  var split = function(s) {
    if (!s || !s.trim()) return [];
    return s.split('|').map(function(x){ return x.trim(); }).filter(Boolean);
  };
  for (var i = 2; i < rows.length; i++) {
    var r = rows[i];
    if (!r || !r[0] || !r[0].trim() || !r[1] || !r[1].trim()) continue;
    var diaId = r[1].trim();
    if (!diasMap[diaId]) {
      diasMap[diaId] = { id: diaId, fecha: r[0].trim(), etiqueta: (r[2] || '').trim(), resumen_dia: (r[3] || '').trim(), comidas: [] };
      diasOrder.push(diaId);
    }
    diasMap[diaId].comidas.push({
      id: (r[4] || '').trim(), titulo: (r[5] || '').trim(), hora: (r[6] || '').trim(), icono: (r[7] || '🍽️').trim(),
      alimentos: split(r[8]),
      tags: { cubierto: split(r[9]), atencion: split(r[10]), contexto: split(r[11]), suplementos: split(r[12]) },
      nota: (r[13] && r[13].trim()) ? r[13].trim() : null
    });
  }
  return diasOrder.map(function(id){ return diasMap[id]; });
}
function exportarAnalisisCSV() {
  var texto = document.getElementById('analisis-output').value;
  if (!texto.trim()) { alert('Genera el análisis primero.'); return; }
  var periodo = document.getElementById('analisis-periodo').value;
  var nivel = document.getElementById('analisis-nivel').value;
  var blob = new Blob(['\uFEFF' + texto], { type: 'text/plain;charset=utf-8;' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'analisis_' + periodo + '_' + nivel + '_' + new Date().toISOString().split('T')[0] + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
  
function prepararAnalisis() {
  var nivel = document.getElementById('analisis-nivel').value;
  var periodo = document.getElementById('analisis-periodo').value;
  var hoy = new Date();
  var desde = new Date();

  if (periodo === 'hoy') { desde = new Date(hoy); }
  else if (periodo === 'semana') { desde.setDate(hoy.getDate() - 7); }
  else if (periodo === 'mes') { desde.setDate(hoy.getDate() - 30); }
  else if (periodo === 'tres_meses') { desde.setDate(hoy.getDate() - 90); }

  var diasFiltrados = DATA.dias.filter(function(dia) {
    var f = new Date(dia.fecha);
    return f >= desde && f <= hoy;
  });

  if (diasFiltrados.length === 0) {
    document.getElementById('analisis-output').value = 'No hay registros en este periodo.';
    return;
  }

  var lineas = [];
  lineas.push('=== ANÁLISIS NUTRICIONAL ===');
  lineas.push('Periodo: ' + periodo + ' | Nivel: ' + nivel);
  lineas.push('Días analizados: ' + diasFiltrados.length);
  lineas.push('');

  diasFiltrados.forEach(function(dia) {
    lineas.push('── ' + dia.etiqueta + ' (' + dia.fecha + ')');
    dia.comidas.forEach(function(c) {
      var linea = '  [' + c.hora + '] ' + c.titulo;
      if (nivel === 'minimo') {
        linea += ' | cubierto: ' + c.tags.cubierto.join(', ');
        linea += ' | atencion: ' + c.tags.atencion.join(', ');
      } else if (nivel === 'recomendado') {
        linea += ' | alimentos: ' + c.alimentos.join(', ');
        linea += ' | cubierto: ' + c.tags.cubierto.join(', ');
        linea += ' | atencion: ' + c.tags.atencion.join(', ');
        linea += ' | contexto: ' + c.tags.contexto.join(', ');
      } else if (nivel === 'completo') {
        linea += ' | alimentos: ' + c.alimentos.join(', ');
        linea += ' | cubierto: ' + c.tags.cubierto.join(', ');
        linea += ' | atencion: ' + c.tags.atencion.join(', ');
        linea += ' | contexto: ' + c.tags.contexto.join(', ');
        linea += ' | suplementos: ' + c.tags.suplementos.join(', ');
        if (c.nota) linea += ' | nota: ' + c.nota;
      }
      lineas.push(linea);
    });
    lineas.push('');
  });

  document.getElementById('analisis-output').value = lineas.join('\n');
}
async function cargarRegistros() {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="empty-state" style="padding:3rem 1.25rem"><span style="font-size:2rem;display:block;margin-bottom:.75rem;opacity:.6">⏳</span><div style="color:var(--muted);font-size:13px">Cargando registros...</div></div>';
  try {
    var hoy = new Date();
    var anio = String(hoy.getFullYear());
    var mes  = String(hoy.getMonth() + 1).padStart(2, '0');
    // Carga el mes actual y el anterior para tener contexto de semana completa
    var mesAnteriorNum = hoy.getMonth(); // 0-based = mes anterior
    var anioAnterior  = mesAnteriorNum === 0 ? String(hoy.getFullYear() - 1) : anio;
    var mesAnterior   = mesAnteriorNum === 0 ? '12' : String(mesAnteriorNum).padStart(2, '0');
    var [dataMesActual, dataMesAnterior] = await Promise.all([
      window._fbGetMes(anio, mes),
      window._fbGetMes(anioAnterior, mesAnterior)
    ]);
    var diasMap = Object.assign({}, dataMesAnterior || {}, dataMesActual || {});
    if (!diasMap || Object.keys(diasMap).length === 0) throw new Error('Sin registros en Firebase');
    DATA.dias = Object.values(diasMap)
      .map(function(d) {
        var comidasArr = d.comidas
          ? Object.values(d.comidas).sort(function(a,b){ return (a.hora||'').localeCompare(b.hora||''); })
          : [];
        return {
          id:         d.meta.dia_id,
          fecha:      d.meta.fecha,
          etiqueta:   d.meta.etiqueta,
          resumen_dia: d.meta.resumen_dia,
          comidas:    comidasArr
        };
      })
      .sort(function(a,b){ return a.fecha.localeCompare(b.fecha); });
    return true;
  } catch(e) {
    console.error('[Firebase] cargarRegistros error:', e);
    document.getElementById('app').innerHTML = '<div class="empty-state" style="padding:3rem 1.25rem"><span style="font-size:2rem;display:block;margin-bottom:.75rem;opacity:.4">⚠️</span><div style="color:var(--muted);font-size:13px">No se pudieron cargar los registros.<br><small>' + e.message + '</small></div></div>';
    return false;
  }
}

function contarTagAtencion(tagKey) {

  return count;
}
function diasConTag(tagKey) {
  var dias = 0;
  DATA.dias.forEach(function(dia) { var found = dia.comidas.some(function(c) { return c.tags.cubierto.indexOf(tagKey) !== -1; }); if (found) dias++; });
  return dias;
}

function generarCAL_MESES() {
  var hoy = new Date();
  var meses = [];
  var nombres = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var diasEnMes = function(anio, mes) { return new Date(anio, mes, 0).getDate(); };
  var offsetPrimerDia = function(anio, mes) {
    var d = new Date(anio, mes-1, 1).getDay();
    return d === 0 ? 6 : d - 1; // Lunes=0
  };
  // Genera desde abril 2026 hasta el mes actual + 1
  var inicio = { anio: 2026, mes: 4 };
  var fin = { anio: hoy.getFullYear(), mes: hoy.getMonth() + 1 };
  var anio = inicio.anio, mes = inicio.mes;
  while (anio < fin.anio || (anio === fin.anio && mes <= fin.mes)) {
    meses.push({
      mes: nombres[mes-1] + ' ' + anio,
      primerOffset: offsetPrimerDia(anio, mes),
      totalDias: diasEnMes(anio, mes),
      anio: anio,
      mesNum: mes
    });
    mes++;
    if (mes > 12) { mes = 1; anio++; }
  }
  return meses;
}

}

  if (cols.length < 13) {
    showFormStatus('err', '⚠️ Se detectaron ' + cols.length + ' columnas, se esperan 14.');
    return null;
  }
  var split = function(s) { return s ? s.split('|').map(function(x){return x.trim();}).filter(Boolean) : []; };
  return {
    fecha: cols[0].trim(), diaId: cols[1].trim(), etiqueta: cols[2].trim(),
    resumenDia: cols[3].trim(), comidaId: cols[4].trim() || 'desayuno',
    titulo: cols[5].trim(), hora: cols[6].trim(), icono: cols[7].trim() || '🍽️',
    alimentos: split(cols[8]),
    tags: { cubierto: split(cols[9]), atencion: split(cols[10]), contexto: split(cols[11]), suplementos: split(cols[12]) },
    nota: (cols[13]||'').trim()
  };
}

function rvParseCSVLine(text) {
  var cols=[], cell='', inQ=false;
  for (var i=0; i<text.length; i++) {
    var c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){cell+='"';i++;}else if(c==='"'){inQ=false;}else{cell+=c;}}
    else{if(c==='"'){inQ=true;}else if(c===','){cols.push(cell);cell='';}else{cell+=c;}}
  }
  cols.push(cell); return cols;
}

function rvHoraA24h(hora) {

  var m=hora.match(/^(\d{1,2}):(\d{2})(am|pm)$/);
  if(m){var h=parseInt(m[1]);if(m[3]==='am'){if(h===12)h=0;}else{if(h!==12)h+=12;}return String(h).padStart(2,'0')+':'+m[2];}
  return hora;
}

function formatHora(h) {
  if (!h) return '';
  h = h.trim().toLowerCase();
  var hm = h.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*(a\.?m\.?|p\.?m\.?)?$/);
  if (!hm) return h;
  return hm[1] + ':' + hm[2] + (hm[3] ? ' ' + hm[3].replace(/\./g,'') : '');
}

async function enviarAIA() {
  var texto = document.getElementById('ia-input').value.trim();
  if (!texto) return;

  var statusEl = document.getElementById('ia-status');
  statusEl.className = 'form-status sending';
  statusEl.innerHTML = '<div class="spinner"></div><span>Procesando con IA…</span>';

  var hoy = new Date().toISOString().split('T')[0];
  var prompt = 'Fecha de hoy: ' + hoy + '\n\n' + texto;

  try {
    var r = await fetch(PROXY_URL + '?msg=' + encodeURIComponent(prompt) + '&system=' + encodeURIComponent(SYSTEM_PROMPT), {
      method: 'GET',
      redirect: 'follow'
    });
    var data = await r.json();
    var csv = data.text.trim();

    // Pasa el resultado al textarea del formulario existente
    document.getElementById('csv-input').value = csv;
    statusEl.className = 'form-status ok';
    statusEl.innerHTML = '✅ Listo — revisa el CSV y ajusta si necesitas antes de enviar.';
  } catch(err) {
    statusEl.className = 'form-status err';
    statusEl.innerHTML = '⚠️ Error: ' + err.message;
  }
}

function agregarMensaje(texto, tipo) {
  var msgs = document.getElementById('ia-chat-messages');
  var div = document.createElement('div');
  div.className = 'ia-msg-' + tipo;
  div.textContent = texto;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function detectarCSV(texto) {
  var lineas = texto.split('\n');
  for (var i = 0; i < lineas.length; i++) {
    var l = lineas[i].trim();
    if (l.match(/^\d{4}-\d{2}-\d{2},/)) return l;
  }
  return null;
}

async function enviarIAChat() {
  var input = document.getElementById('ia-chat-input');
  var texto = input.value.trim();
  if (!texto) return;
  input.value = '';

  agregarMensaje(texto, 'user');
  iaChatHistory.push({ role: 'user', content: texto });

  var typing = agregarMensaje('…', 'typing');

  try {
    var hoy = new Date().toISOString().split('T')[0];
    var mensajes = [{ role: 'user', content: 'Fecha de hoy: ' + hoy }].concat(iaChatHistory);

    var r = await fetch(PROXY_URL + '?msg=' + encodeURIComponent(JSON.stringify(mensajes)), {
      method: 'GET',
      redirect: 'follow'
    });
    var data = await r.json();
    var respuesta = data.text.trim();

    typing.remove();
    agregarMensaje(respuesta, 'bot');
    iaChatHistory.push({ role: 'assistant', content: respuesta });

    var csv = detectarCSV(respuesta);
    if (csv) {
      iaCSVDetectado = csv;
      document.getElementById('ia-csv-preview').textContent = csv;
      document.getElementById('ia-csv-bar').style.display = 'block';
    }
  } catch(err) {
    typing.remove();
    agregarMensaje('Error: ' + err.message, 'bot');
  }
}

function usarCSV() {
  if (!iaCSVDetectado) return;
  document.getElementById('csv-input').value = iaCSVDetectado;
  cerrarIAChat();
}

      <button onclick="usarCSV()" style="margin-top:8px;width:100%;padding:8px;border-radius:10px;background:var(--green);color:#000;border:none;font-size:13px;font-weight:700;cursor:pointer;">✅ Usar este CSV</button>
    </div>

    <!-- Input -->
    <div style="padding:.75rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;">
      <textarea id="ia-chat-input" rows="2" placeholder="Ej: comi 3 huevos con jamón a las 9am..." style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:8px 12px;resize:none;outline:none;line-height:1.4;" onkeydown="iaChatKeydown(event)"></textarea>
      <button onclick="enviarIAChat()" style="width:40px;height:40px;border-radius:10px;background:var(--green);color:#000;border:none;font-size:1.1rem;cursor:pointer;flex-shrink:0;align-self:flex-end;">↑</button>
    </div>

  </div>
</div>
  
  <div id="revisar-overlay" onclick="cerrarRevisarSiOverlay(event)" style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s;display:flex;align-items:flex-end;justify-content:center;">
  <div id="revisar-panel" style="background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2;">
      <div style="font-family:'Fraunces',serif;font-weight:300;font-size:1.1rem;">🔍 Revisar entrada</div>
      <div onclick="cerrarRevisar()" style="width:30px;height:30px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;">✕</div>
    </div>
    <div style="padding:1.1rem 1.25rem;" id="panel-body-inner"></div>
  </div>
</div>

<div id="rv-modal-overlay" onclick="cerrarRvModalSiOverlay(event)" style="position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:350;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;">
  <div id="rv-modal" style="background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:640px;max-height:75vh;overflow-y:auto;padding:1.1rem;transform:translateY(20px);transition:transform .25s;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;">
      <div style="font-family:'Fraunces',serif;font-size:.95rem;font-weight:300;" id="rv-modal-title">Tags</div>
      <div onclick="cerrarRvModal()" style="width:26px;height:26px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;">✕</div>
    </div>
    <div id="rv-modal-body"></div>
    <div style="position:sticky;bottom:0;background:var(--surface);padding-top:.85rem;margin-top:.85rem;border-top:1px solid var(--border);">
      <button onclick="aplicarRvModal()" style="width:100%;padding:.75rem;border-radius:12px;background:var(--accent);color:#000;border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;">Listo</button>
    </div>
  </div>
</div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
