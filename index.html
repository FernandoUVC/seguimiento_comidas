<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro Nutricional v20</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2435;--border:#2a3045;--text:#e8eaf0;--muted:#6b7280;--green:#4ade80;--green-bg:#052e16;--yellow:#fbbf24;--yellow-bg:#1c1400;--red:#f87171;--red-bg:#2d0a0a;--blue:#60a5fa;--blue-bg:#0a1628;--purple:#c084fc;--purple-bg:#1a0a2e;--orange:#fb923c;--accent:#4ade80;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;}
.hero{background:linear-gradient(135deg,#0f1117 0%,#1a2440 50%,#0f1117 100%);border-bottom:1px solid var(--border);padding:2.5rem 1.25rem 2rem;text-align:center;}
.hero-tag{display:inline-block;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.3);color:var(--green);font-size:11px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:1rem;}
.hero h1{font-family:'Fraunces',serif;font-size:2rem;font-weight:600;color:#fff;margin-bottom:.4rem;}
.hero p{color:var(--muted);font-size:13px;}
.download-btn{display:inline-flex;align-items:center;gap:8px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);color:var(--green);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;margin-top:1.2rem;transition:all .2s;font-family:'DM Sans',sans-serif;}
.download-btn:hover{background:rgba(74,222,128,.2);}
.nav-scroll{overflow-x:auto;display:flex;gap:8px;padding:1rem 1.25rem;border-bottom:1px solid var(--border);scrollbar-width:none;background:var(--surface);position:sticky;top:0;z-index:100;}
.nav-scroll::-webkit-scrollbar{display:none;}
.nav-pill{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;}
.nav-pill:hover,.nav-pill.active{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);color:var(--green);}
main{padding:1.25rem;max-width:680px;margin:0 auto;}
.section-header{display:flex;align-items:center;gap:10px;margin:2rem 0 1rem;}
.section-header h2{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:600;color:#fff;}
.section-line{flex:1;height:1px;background:var(--border);}
.context-grid{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem;}
.context-row{display:grid;grid-template-columns:1fr 2fr;border-bottom:1px solid var(--border);}
.context-row:last-child{border-bottom:none;}
.context-cell{padding:10px 14px;font-size:13px;}
.context-cell:first-child{border-right:1px solid var(--border);color:var(--muted);font-weight:500;}
.day-section{margin-bottom:2.5rem;}
.day-label{display:inline-flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--muted);margin-bottom:1rem;font-weight:500;}
.day-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1rem;}
.meal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;user-select:none;}
.meal-header-left{display:flex;align-items:center;gap:10px;}
.meal-icon{font-size:1.2rem;width:34px;height:34px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:8px;flex-shrink:0;}
.meal-title{font-weight:500;font-size:14px;color:#fff;}
.meal-time{font-size:11px;color:var(--muted);margin-top:1px;}
.meal-chevron{color:var(--muted);font-size:12px;transition:transform .3s;}
.meal-card.open .meal-chevron{transform:rotate(180deg);}
.meal-body{display:none;padding:14px 16px;}
.meal-card.open .meal-body{display:block;}
.food-list{margin-bottom:1rem;}
.food-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);}
.food-item:last-child{border-bottom:none;}
.food-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);margin-top:7px;flex-shrink:0;}
.tag-section-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:12px 0 8px;}
.tag-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:12px;}
.tag.ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(74,222,128,.2);}
.tag.warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(251,191,36,.2);}
.tag.bad{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.tag.purple{background:var(--purple-bg);color:var(--purple);border:1px solid rgba(192,132,252,.2);}
.tag.ctx{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.note{background:rgba(251,191,36,.06);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:var(--muted);margin:10px 0;}
.note.good{background:rgba(74,222,128,.06);border-color:var(--green);}
.note.info{background:rgba(96,165,250,.06);border-color:var(--blue);}
.resumen-grid{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem;}
.resumen-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.resumen-row-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:6px;}
.resumen-cat{font-weight:500;font-size:13px;}
.resumen-days{display:flex;gap:5px;flex-wrap:wrap;}
.resumen-badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow);}
.badge-red{background:var(--red-bg);color:var(--red);}
.badge-gray{background:var(--surface2);color:var(--muted);}
.auto-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.05);}
.stat-pill{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.stat-pill.red{background:rgba(248,113,113,.08);color:var(--red);border-color:rgba(248,113,113,.2);}
.stat-pill.green{background:rgba(74,222,128,.08);color:var(--green);border-color:rgba(74,222,128,.2);}
.stat-pill.yellow{background:rgba(251,191,36,.08);color:var(--yellow);border-color:rgba(251,191,36,.2);}
.alert-list{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem;}
.alert-item{display:flex;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;}
.alert-icon{font-size:1rem;flex-shrink:0;margin-top:1px;}
.alert-text strong{display:block;font-weight:500;margin-bottom:2px;}
.alert-text span{color:var(--muted);font-size:12px;}
.consejo-list{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem;}
.consejo-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:13px;display:flex;gap:10px;}
.consejo-emoji{font-size:1.1rem;flex-shrink:0;}
footer{text-align:center;padding:2rem 1.25rem;border-top:1px solid var(--border);color:var(--muted);font-size:12px;}
.secondary-nav{overflow-x:auto;display:flex;gap:6px;padding:.75rem 1.25rem;border-bottom:1px solid var(--border);scrollbar-width:none;background:var(--surface);position:sticky;top:0;z-index:100;align-items:center;}
.secondary-nav::-webkit-scrollbar{display:none;}
.nav-divider{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 2px;}
.sec-pill{flex-shrink:0;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;text-decoration:none;font-family:'DM Sans',sans-serif;}
.sec-pill:hover,.sec-pill.active{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);color:var(--green);}
.cal-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.25rem 1.2rem;}
.cal-header{display:flex;align-items:center;justify-content:space-between;padding:.5rem .75rem;}
.cal-mes{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:#fff;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;max-width:320px;margin:0 auto;}
.cal-dayname{text-align:center;font-size:10px;font-weight:500;color:var(--muted);padding:2px 0;letter-spacing:.06em;text-transform:uppercase;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:12px;font-weight:500;color:var(--surface2);}
.cal-day.has-data{background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;}
.cal-day.has-data:hover{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.35);color:var(--green);}
.cal-day.selected{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.55);color:var(--green);font-weight:700;}
.empty-state{text-align:center;padding:3rem 1.25rem;color:var(--muted);font-size:13px;}
.empty-state span{font-size:2rem;display:block;margin-bottom:.75rem;opacity:.4;}
.cal-arrow{background:none;border:1px solid var(--border);color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:1.3rem;line-height:1;transition:all .2s;}
.cal-arrow:hover{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);color:var(--green);}
.cal-arrow:disabled{opacity:.25;cursor:default;}

/* ── REGISTRO FORM ── */
#registro-view{padding:0;}
.registro-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.5rem;}
.registro-form-header{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.registro-form-header .form-icon{width:34px;height:34px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.25);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;}
.registro-form-header .form-title{font-family:'Fraunces',serif;font-size:1rem;font-weight:600;color:#fff;}
.registro-form-header .form-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.registro-form-body{padding:18px;}
.csv-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;display:block;}
.csv-textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',monospace;font-size:12px;padding:12px 14px;resize:vertical;min-height:90px;line-height:1.5;transition:border-color .2s;outline:none;}
.csv-textarea:focus{border-color:rgba(74,222,128,.5);box-shadow:0 0 0 3px rgba(74,222,128,.07);}
.csv-textarea::placeholder{color:var(--muted);opacity:.6;}
.csv-hint{margin-top:8px;font-size:11px;color:var(--muted);line-height:1.5;}
.csv-hint code{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:monospace;color:#93c5fd;font-size:10px;}
.form-actions{display:flex;align-items:center;gap:10px;margin-top:14px;}
.btn-submit{background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.4);color:var(--green);padding:10px 22px;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:7px;}
.btn-submit:hover{background:rgba(74,222,128,.25);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;}
.btn-clear{background:none;border:1px solid var(--border);color:var(--muted);padding:10px 16px;border-radius:24px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-clear:hover{border-color:rgba(248,113,113,.4);color:var(--red);}
.form-status{margin-top:12px;padding:10px 14px;border-radius:10px;font-size:13px;display:none;}
.form-status.ok{background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);color:var(--green);display:flex;gap:8px;align-items:flex-start;}
.form-status.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:var(--red);display:flex;gap:8px;align-items:flex-start;}
.form-status.sending{background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);color:var(--blue);display:flex;gap:8px;align-items:center;}
.registro-tips{display:flex;flex-direction:column;gap:8px;}
.tip-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--muted);display:flex;gap:9px;align-items:flex-start;}
.tip-card .tip-icon{flex-shrink:0;font-size:.95rem;margin-top:1px;}
/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:14px;height:14px;border:2px solid rgba(96,165,250,.3);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag" id="hero-tag">Semana 1 &middot; Abril 2026</div>
  <h1>Registro Nutricional</h1>
  <p id="hero-meta">Cargando...</p>

</div>

<nav class="secondary-nav">

  <div class="nav-divider"></div>
  <button class="sec-pill" data-view="registro">✏️ Registrar</button>
</nav>
  
<div class="cal-wrap" id="cal-wrap">
  <div class="cal-header"><button class="cal-arrow" id="cal-prev" onclick="calNavMes(-1)">&#x2039;</button><span class="cal-mes" id="cal-mes-label"></span><button class="cal-arrow" id="cal-next" onclick="calNavMes(1)">&#x203A;</button></div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<main id="app"></main>

function submitGForm() {
  var csv = document.getElementById('csv-input').value.trim();

  // Rellena el input oculto del form real
  document.getElementById('gform-entry').value = csv;

  formState.sending = true;
  formState.submitted = false;

  showFormStatus('sending', 'Enviando al Sheet…');
  document.getElementById('btn-submit').disabled = true;

  document.getElementById('gform-real').submit();

  // Timeout de seguridad: si el iframe no responde en 8s, asumimos éxito

  setTimeout(function() {
    if (formState.sending) {

function parseCSVText(text) {
  var rows = [], row = [], cell = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c !== '\r') { cell += c; }
    }
  }
  if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
  return rows;
}

function csvRowsToDias(rows) {
  var diasMap = {}, diasOrder = [];
  var split = function(s) {
    if (!s || !s.trim()) return [];
    return s.split('|').map(function(x){ return x.trim(); }).filter(Boolean);
  };
  for (var i = 2; i < rows.length; i++) {
    var r = rows[i];
    if (!r || !r[0] || !r[0].trim() || !r[1] || !r[1].trim()) continue;
    var diaId = r[1].trim();
    if (!diasMap[diaId]) {
      diasMap[diaId] = { id: diaId, fecha: r[0].trim(), etiqueta: (r[2] || '').trim(), resumen_dia: (r[3] || '').trim(), comidas: [] };
      diasOrder.push(diaId);
    }
    diasMap[diaId].comidas.push({
      id: (r[4] || '').trim(), titulo: (r[5] || '').trim(), hora: (r[6] || '').trim(), icono: (r[7] || '🍽️').trim(),
      alimentos: split(r[8]),
      tags: { cubierto: split(r[9]), atencion: split(r[10]), contexto: split(r[11]), suplementos: split(r[12]) },
      nota: (r[13] && r[13].trim()) ? r[13].trim() : null
    });
  }
  return diasOrder.map(function(id){ return diasMap[id]; });
}
function prepararAnalisis() {
  var nivel = document.getElementById('analisis-nivel').value;
  var periodo = document.getElementById('analisis-periodo').value;
  var hoy = new Date();
  var desde = new Date();

  if (periodo === 'hoy') { desde = new Date(hoy); }
  else if (periodo === 'semana') { desde.setDate(hoy.getDate() - 7); }
  else if (periodo === 'mes') { desde.setDate(hoy.getDate() - 30); }
  else if (periodo === 'tres_meses') { desde.setDate(hoy.getDate() - 90); }

  var diasFiltrados = DATA.dias.filter(function(dia) {
    var f = new Date(dia.fecha);
    return f >= desde && f <= hoy;
  });

  if (diasFiltrados.length === 0) {
    document.getElementById('analisis-output').value = 'No hay registros en este periodo.';
    return;
  }

  var lineas = [];
  lineas.push('=== ANÁLISIS NUTRICIONAL ===');
  lineas.push('Periodo: ' + periodo + ' | Nivel: ' + nivel);
  lineas.push('Días analizados: ' + diasFiltrados.length);
  lineas.push('');

  diasFiltrados.forEach(function(dia) {
    lineas.push('── ' + dia.etiqueta + ' (' + dia.fecha + ')');
    dia.comidas.forEach(function(c) {
      var linea = '  [' + c.hora + '] ' + c.titulo;
      if (nivel === 'minimo') {
        linea += ' | cubierto: ' + c.tags.cubierto.join(', ');
        linea += ' | atencion: ' + c.tags.atencion.join(', ');
      } else if (nivel === 'recomendado') {
        linea += ' | alimentos: ' + c.alimentos.join(', ');
        linea += ' | cubierto: ' + c.tags.cubierto.join(', ');
        linea += ' | atencion: ' + c.tags.atencion.join(', ');
        linea += ' | contexto: ' + c.tags.contexto.join(', ');
      } else if (nivel === 'completo') {
        linea += ' | alimentos: ' + c.alimentos.join(', ');
        linea += ' | cubierto: ' + c.tags.cubierto.join(', ');
        linea += ' | atencion: ' + c.tags.atencion.join(', ');
        linea += ' | contexto: ' + c.tags.contexto.join(', ');
        linea += ' | suplementos: ' + c.tags.suplementos.join(', ');
        if (c.nota) linea += ' | nota: ' + c.nota;
      }
      lineas.push(linea);
    });
    lineas.push('');
  });

  document.getElementById('analisis-output').value = lineas.join('\n');
}
async function cargarRegistros() {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="empty-state" style="padding:3rem 1.25rem"><span style="font-size:2rem;display:block;margin-bottom:.75rem;opacity:.6">⏳</span><div style="color:var(--muted);font-size:13px">Cargando registros...</div></div>';
  try {
    var res = await fetch(SHEET_CSV);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var text = await res.text();
    var rows = parseCSVText(text);
    DATA.dias = csvRowsToDias(rows);
    if (DATA.dias.length === 0) throw new Error('El sheet no devolvió registros válidos');
    return true;
  } catch(e) {
    console.error('[Sheet] Error:', e);
    app.innerHTML = '<div class="empty-state" style="padding:3rem 1.25rem"><span style="font-size:2rem;display:block;margin-bottom:.75rem;opacity:.4">⚠️</span><div style="color:var(--muted);font-size:13px">No se pudieron cargar los registros.<br><small>' + e.message + '</small></div></div>';
    return false;
  }
}

}

      '</select>' +
    '</div>' +
    '<button onclick="prepararAnalisis()" style="width:100%;padding:.75rem;border-radius:12px;background:var(--accent);color:#fff;border:none;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:1rem;">🔍 Generar texto para análisis</button>' +
    '<textarea id="analisis-output" readonly rows="14" style="width:100%;padding:.8rem;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-family:monospace;resize:vertical;box-sizing:border-box;" placeholder="El texto para pegar en Claude aparecerá aquí..."></textarea>' +
    '<button onclick="navigator.clipboard.writeText(document.getElementById(\'analisis-output\').value)" style="width:100%;margin-top:.5rem;padding:.6rem;border-radius:10px;background:var(--card);color:var(--text);border:1px solid var(--border);font-size:14px;cursor:pointer;">📋 Copiar al portapapeles</button>' +
  '</div>';
}
function renderTags(arr, cls) {
  if (!arr || arr.length === 0) return "";
  return arr.map(function(t) { return '<span class="tag ' + cls + '">' + labelTag(t) + '</span>'; }).join("");
}
function renderComida(c) {
  var alimentos = c.alimentos.map(function(a) { return '<div class="food-item"><div class="food-dot"></div>' + a + '</div>'; }).join("");
  var secciones = "";
  if (c.tags.cubierto.length > 0) secciones += '<div class="tag-section-title">Cubierto</div><div class="tag-grid">' + renderTags(c.tags.cubierto, "ok") + "</div>";
  if (c.tags.atencion.length > 0) secciones += '<div class="tag-section-title">Atención</div><div class="tag-grid">' + renderTags(c.tags.atencion, "warn") + "</div>";
  if (c.tags.contexto.length > 0) secciones += '<div class="tag-section-title">Contexto</div><div class="tag-grid">' + renderTags(c.tags.contexto, "ctx") + "</div>";
  if (c.tags.suplementos.length > 0) secciones += '<div class="tag-section-title">Suplementos</div><div class="tag-grid">' + renderTags(c.tags.suplementos, "purple") + "</div>";
  var nota = c.nota ? '<div class="note">' + c.nota + "</div>" : "";
  var supIndicators = "";
  if (c.tags.suplementos && c.tags.suplementos.length > 0) {
    var supMap = { doublex_media:{label:"2X",color:"#fbbf24"}, doublex_completa:{label:"2X·2",color:"#fb923c"}, omega3_capsula:{label:"Ω3",color:"#60a5fa"}, menjurje:{label:"🧉 MNJ",color:"#4ade80"} };
    supIndicators = c.tags.suplementos.map(function(s){ var m=supMap[s]||{label:s,color:"#6b7280"}; return '<span style="display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.04em;background:'+m.color+'22;border:1px solid '+m.color+'55;color:'+m.color+';margin-left:6px;flex-shrink:0;">'+m.label+'</span>'; }).join("");
  }
  return '<div class="meal-card"><div class="meal-header" onclick="toggle(this)"><div class="meal-header-left"><div class="meal-icon">'+c.icono+'</div><div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px;"><div class="meal-title">'+c.titulo+'</div>'+supIndicators+'</div><div class="meal-time">'+c.hora+'</div></div><div class="meal-chevron">&#x25BC;</div></div><div class="meal-body">'+(alimentos?'<div class="food-list">'+alimentos+'</div>':'')+nota+secciones+'</div></div>';
}
function renderDia(dia) {
  var comidas = dia.comidas.map(renderComida).join("");
  return '<div id="'+dia.id+'" class="day-section"><div class="section-header"><h2>'+dia.etiqueta+'</h2><div class="section-line"></div></div><div class="day-label"><div class="day-dot"></div>'+dia.resumen_dia+'</div>'+comidas+'</div>';
}
function badgeClass(val) {
  if (val === "EXCELENTE" || val === "BIEN") return "badge-green";
  if (val === "PARCIAL" || val === "MODERADO") return "badge-yellow";
  if (val === "AUSENTE" || val === "ALTO" || val === "MUY_ALTO") return "badge-red";
  return "badge-gray";
}
function renderResumen() {
  var stats = calcAutoStats();
  var html = '<div id="resumen"><div class="section-header"><h2>Resumen semanal</h2><div class="section-line"></div></div>';
  html += '<p style="color:var(--muted);font-size:13px;margin-bottom:1rem">Últimos ' + DATA.dias.length + ' días registrados</p>';
  html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:1rem;"><div style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;">Conteo automático de tags</div><div class="auto-stats"><span class="stat-pill red">Sodio alto: '+stats.sodio_alto+' comidas</span><span class="stat-pill yellow">Sodio moderado: '+stats.sodio_moderado+' comidas</span><span class="stat-pill red">Sin vegetales: '+stats.sin_vegetales+' comidas</span><span class="stat-pill yellow">Fritos: '+stats.fritos+' comidas</span><span class="stat-pill yellow">Ayuno prolongado: '+stats.ayuno+' días</span><span class="stat-pill green">Proteína: '+stats.dias_proteina+'/'+DATA.dias.length+' días</span><span class="stat-pill green">Vitamina C: '+stats.dias_vitamina_c+'/'+DATA.dias.length+' días</span><span class="stat-pill green">Omega-3: '+stats.dias_omega3+'/'+DATA.dias.length+' días</span><span class="stat-pill green">Double X tomas: '+stats.doublex_tomas+'</span></div></div>';
  html += '<div class="resumen-grid">';
  DATA.resumen.categorias.forEach(function(cat) {
    var badges = Object.keys(cat.evaluacion).map(function(diaId) {
      var dia = DATA.dias.find(function(d){ return d.id === diaId; });
      var label = dia ? dia.etiqueta.split(" ").slice(0,2).join(" ") : diaId;
      var val = cat.evaluacion[diaId];
      return '<span class="resumen-badge '+badgeClass(val)+'">'+label.split(" ")[0].slice(0,3)+' '+val+'</span>';
    }).join("");
    html += '<div class="resumen-row"><div class="resumen-row-top"><div class="resumen-cat">'+cat.nombre+'</div><div class="resumen-days">'+badges+'</div></div><div class="resumen-note">'+cat.nota_claude+'</div></div>';
  });
  html += "</div></div>";
  return html;
}
function renderAlertas() {
  var html = '<div id="alertas"><div class="section-header"><h2>Alertas</h2><div class="section-line"></div></div><div class="alert-list">';
  DATA.alertas.forEach(function(a) { html += '<div class="alert-item '+(a.tipo==='good'?'good':a.tipo==='info'?'info':'')+'"><div class="alert-icon">'+a.icono+'</div><div class="alert-text"><strong>'+a.titulo+'</strong><span>'+a.detalle+'</span></div></div>'; });
  html += "</div></div>"; return html;
}
function renderConsejos() {
  var html = '<div id="consejos"><div class="section-header"><h2>Consejos</h2><div class="section-line"></div></div><div class="consejo-list">';
  DATA.consejos.forEach(function(c) { html += '<div class="consejo-item"><div class="consejo-emoji">'+c.emoji+'</div><div>'+c.texto+'</div></div>'; });
  html += "</div></div>"; return html;
}
function renderContexto() {
  var html = '<div id="contexto"><div class="section-header"><h2>Dieta base</h2><div class="section-line"></div></div><div class="context-grid"><div class="context-row" style="background:rgba(74,222,128,.08)"><div class="context-cell" style="color:var(--green);font-size:11px;text-transform:uppercase;letter-spacing:.08em">Item</div><div class="context-cell" style="color:var(--green);font-size:11px;text-transform:uppercase;letter-spacing:.08em">Descripción</div></div>';
  DATA.contexto.forEach(function(row) { html += '<div class="context-row"><div class="context-cell">'+row.label+'</div><div class="context-cell">'+row.valor+'</div></div>'; });
  html += "</div></div>"; return html;
}
function render() {
  document.getElementById("hero-tag").textContent = "Semana " + DATA.meta.semana + " · " + DATA.meta.periodo;
  document.getElementById("hero-meta").textContent = "Actualizado: " + DATA.meta.actualizado + " · " + DATA.meta.ubicacion;
}

var appState = { view: "dia", diaId: null };
var CAL_META = { mes: "Abril 2026", primerOffset: 2, totalDias: 30, anio: 2026, mesNum: 4 };
var CAL_MESES = [
  { mes: "Abril 2026",  primerOffset: 2, totalDias: 30, anio: 2026, mesNum: 4 },
  { mes: "Mayo 2026",   primerOffset: 4, totalDias: 31, anio: 2026, mesNum: 5 }
];
var calMesIdx = 0;

function calNavMes(dir) {
  var newIdx = calMesIdx + dir;
  if (newIdx < 0 || newIdx >= CAL_MESES.length) return;
  calMesIdx = newIdx;
  CAL_META = Object.assign({}, CAL_MESES[calMesIdx]);
  renderCalendar();
  var prev = document.getElementById("cal-prev");
  var next = document.getElementById("cal-next");
  if (prev) prev.disabled = (calMesIdx === 0);
  if (next) next.disabled = (calMesIdx === CAL_MESES.length - 1);
}

function buildDiasConData() {
  var map = {};
  DATA.dias.forEach(function(d) {
    var parts = d.fecha.split("-");
    var mesNum = parseInt(parts[1], 10);
    var diaNum = parseInt(parts[2], 10);
    if (mesNum === CAL_META.mesNum) map[diaNum] = d.id;
  });
  return map;
}

function renderCalendar() {
  var diasConData = buildDiasConData();
  var dayNames = ["L","M","X","J","V","S","D"];
  var grid = document.getElementById("cal-grid");
  var label = document.getElementById("cal-mes-label");
  var calWrap = document.getElementById("cal-wrap");
  calWrap.style.display = (appState.view === "dia") ? "" : "none";
  if (appState.view !== "dia") return;
  label.textContent = CAL_META.mes;
  var html = dayNames.map(function(d){ return '<div class="cal-dayname">'+d+'</div>'; }).join("");
  for (var i = 0; i < CAL_META.primerOffset; i++) html += '<div class="cal-day"></div>';
  for (var d = 1; d <= CAL_META.totalDias; d++) {
    var diaId = diasConData[d];
    var isSelected = diaId && appState.diaId === diaId;
    var cls = "cal-day" + (diaId ? " has-data" : "") + (isSelected ? " selected" : "");
    var click = diaId ? ' onclick="selectDia(\''+diaId+'\')"' : "";
    html += '<div class="'+cls+'"'+click+'>'+d+'</div>';
  }
  grid.innerHTML = html;
}

function updateSecNav() {
  var pills = document.querySelectorAll(".sec-pill");
  pills.forEach(function(p){ p.classList.toggle("active", p.dataset.view === appState.view); });
}

function updateView() {
  updateSecNav();
  renderCalendar();
  var app = document.getElementById("app");
  if (appState.view === "dia") {
    if (!appState.diaId) { app.innerHTML = '<div class="empty-state"><span>📅</span>Selecciona un día en el calendario</div>'; return; }
    var dia = DATA.dias.find(function(d){ return d.id === appState.diaId; });
    app.innerHTML = dia ? renderDia(dia) : '<div class="empty-state"><span>🔍</span>Día no encontrado</div>';
  } else if (appState.view === "semana" || appState.view === "mes") {
    app.innerHTML = renderResumen() + renderAlertas() + renderConsejos();
  } else if (appState.view === "contexto") {
    app.innerHTML = renderContexto();
  } else if (appState.view === "alertas") {
    app.innerHTML = renderAlertas();
  } else if (appState.view === "consejos") {
    app.innerHTML = renderConsejos();
  } else if (appState.view === "registro") {
    app.innerHTML = renderRegistro();
  } else if (appState.view === "analisis") {
    app.innerHTML = renderAnalisis();
  }
}

function selectDia(id) {
  appState.view = "dia"; appState.diaId = id; updateView();
  setTimeout(function(){ var app = document.getElementById("app"); if (app) app.scrollIntoView({behavior:"smooth",block:"start"}); }, 50);
}
function setView(v) {
  appState.view = v; appState.diaId = null; updateView();
  setTimeout(function(){ var app = document.getElementById("app"); if (app) app.scrollIntoView({behavior:"smooth",block:"start"}); }, 50);
}

function exportCSV() {
  var rows = [["Fecha","Día","Comida","Hora","Alimentos","Tags cubierto","Tags atención","Tags contexto","Suplementos","Nota"]];
  DATA.dias.forEach(function(dia) {
    dia.comidas.forEach(function(c) {
      rows.push([dia.fecha, dia.etiqueta, c.titulo, c.hora, c.alimentos.join(" | "), c.tags.cubierto.map(labelTag).join(" | "), c.tags.atencion.map(labelTag).join(" | "), c.tags.contexto.map(labelTag).join(" | "), c.tags.suplementos.map(labelTag).join(" | "), c.nota || ""]);
    });
  });
  var csv = rows.map(function(r){ return r.map(function(cell){ return '"'+String(cell).replace(/"/g,'""')+'"'; }).join(","); }).join("\n");
  var bom = "\uFEFF";
  var blob = new Blob([bom + csv], {type:"text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var el = document.createElement("a");
  el.href = url; el.download = "registro_nutricional_s"+String(DATA.meta.semana).padStart(2,"0")+".csv";
  document.body.appendChild(el); el.click(); document.body.removeChild(el); URL.revokeObjectURL(url);
}

function toggle(h) { h.parentElement.classList.toggle("open"); }

window.onload = async function() {
  render();
  var pills = document.querySelectorAll(".sec-pill");
  pills.forEach(function(p){ p.onclick = function(){ setView(p.dataset.view); }; });

  const [ok] = await Promise.all([
    cargarRegistros(),
    cargarAlertas(),
    cargarConsejos()
  ]);

  if (!ok || DATA.dias.length === 0) return;
  var ultimo = DATA.dias[DATA.dias.length - 1];
  appState.diaId = ultimo.id; appState.view = "dia"; updateView();
};
</script>
</body>
</html>
