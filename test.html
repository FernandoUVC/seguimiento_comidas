.badge-red{background:var(--red-bg);color:var(--red);}

var SHEET_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRFwVwj-1-DDWpkAJCMDtbiRDF-G6q2no2wb6rLrusEDZinoWQl93lwqoMOBn1ObaSIDD9estLuxUUY/pub?output=csv';

function parseCSVText(text) {
  var rows = [], row = [], cell = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cell += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(cell); cell = ''; }
      else if (c === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else if (c !== '\r') { cell += c; }
    }
  }
  if (cell !== '' || row.length > 0) { row.push(cell); rows.push(row); }
  return rows;
}

function csvRowsToDias(rows) {
  var diasMap = {}, diasOrder = [];
  var split = function(s) {
    if (!s || !s.trim()) return [];
    return s.split('|').map(function(x){ return x.trim(); }).filter(Boolean);
  };
  for (var i = 2; i < rows.length; i++) {
    var r = rows[i];
    if (!r || !r[0] || !r[0].trim() || !r[1] || !r[1].trim()) continue;
    var diaId = r[1].trim();
    if (!diasMap[diaId]) {
      diasMap[diaId] = {
        id: diaId,
        fecha: r[0].trim(),
        etiqueta: (r[2] || '').trim(),
        resumen_dia: (r[3] || '').trim(),
        comidas: []
      };
      diasOrder.push(diaId);
    }
    diasMap[diaId].comidas.push({
      id: (r[4] || '').trim(),
      titulo: (r[5] || '').trim(),
      hora: (r[6] || '').trim(),
      icono: (r[7] || '🍽️').trim(),
      alimentos: split(r[8]),
      tags: {
        cubierto:    split(r[9]),
        atencion:    split(r[10]),
        contexto:    split(r[11]),
        suplementos: split(r[12])
      },
      nota: (r[13] && r[13].trim()) ? r[13].trim() : null
    });
  }
  return diasOrder.map(function(id){ return diasMap[id]; });
}

async function cargarRegistros() {
  var app = document.getElementById('app');
  app.innerHTML = '<div class="empty-state" style="padding:3rem 1.25rem">' +
    '<span style="font-size:2rem;display:block;margin-bottom:.75rem;opacity:.6">⏳</span>' +
    '<div style="color:var(--muted);font-size:13px">Cargando registros...</div>' +
    '</div>';
  try {
    var res = await fetch(SHEET_CSV);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var text = await res.text();
    var rows = parseCSVText(text);
    DATA.dias = csvRowsToDias(rows);
    if (DATA.dias.length === 0) throw new Error('El sheet no devolvió registros válidos');
    console.log('[Sheet] ' + DATA.dias.length + ' días cargados, ' +
      DATA.dias.reduce(function(acc,d){ return acc + d.comidas.length; }, 0) + ' comidas.');
    return true;
  } catch(e) {
    console.error('[Sheet] Error:', e);
    app.innerHTML = '<div class="empty-state" style="padding:3rem 1.25rem">' +
      '<span style="font-size:2rem;display:block;margin-bottom:.75rem;opacity:.4">⚠️</span>' +
      '<div style="color:var(--muted);font-size:13px">' +
        'No se pudieron cargar los registros.<br>' +
        '<small>' + e.message + '</small><br><br>' +
        '<small style="opacity:.6">Verifica que el Sheet sea público (compartir → cualquiera con el enlace)</small>' +
      '</div>' +
      '</div>';
    return false;
  }
}

function contarTagAtencion(tagKey) {
  var count = 0;
  DATA.dias.forEach(function(dia) {
    dia.comidas.forEach(function(comida) {
      if (comida.tags.atencion.indexOf(tagKey) !== -1) count++;
    });
  });
  return count;
}

function diasConTag(tagKey) {
  var dias = 0;
  DATA.dias.forEach(function(dia) {
    var found = dia.comidas.some(function(c) {
      return c.tags.cubierto.indexOf(tagKey) !== -1;
    });
    if (found) dias++;
  });
  return dias;
}

function calcAutoStats() {
  return {
    sodio_alto:       contarTagAtencion("sodio_alto"),
    sodio_moderado:   contarTagAtencion("sodio_moderado"),
    sin_vegetales:    contarTagAtencion("sin_vegetales"),
    fritos:           contarTagAtencion("fritos"),
    ayuno:            contarTagAtencion("ayuno_prolongado"),
    comida_fuera:     contarTagAtencion("comida_fuera") + DATA.dias.reduce(function(acc, d) {
      return acc + d.comidas.filter(function(c){ return c.tags.contexto.indexOf("comida_fuera") !== -1; }).length;
    }, 0) / 2,  
    dias_proteina:    diasConTag("proteina"),
    dias_vitamina_c:  diasConTag("vitamina_c"),
    dias_omega3:      diasConTag("omega3"),
    doublex_tomas:    DATA.dias.reduce(function(acc, d) {
      return acc + d.comidas.filter(function(c){
        return c.tags.suplementos.indexOf("doublex_media") !== -1 ||
               c.tags.suplementos.indexOf("doublex_completa") !== -1;
      }).length;
    }, 0)
  };
}

function labelTag(key) {
  return TAG_CATALOG[key] ? TAG_CATALOG[key].label : key;
}

function renderTags(arr, cls) {
  if (!arr || arr.length === 0) return "";
  return arr.map(function(t) {
    return '<span class="tag ' + cls + '">' + labelTag(t) + '</span>';
  }).join("");
}

function renderComida(c) {
  var alimentos = c.alimentos.map(function(a) {
    return '<div class="food-item"><div class="food-dot"></div>' + a + '</div>';
  }).join("");

  var secciones = "";

  if (c.tags.cubierto.length > 0) {
    secciones += '<div class="tag-section-title">Cubierto</div><div class="tag-grid">' +
      renderTags(c.tags.cubierto, "ok") + "</div>";
  }
  if (c.tags.atencion.length > 0) {
    secciones += '<div class="tag-section-title">Atención</div><div class="tag-grid">' +
      renderTags(c.tags.atencion, "warn") + "</div>";
  }
  if (c.tags.contexto.length > 0) {
    secciones += '<div class="tag-section-title">Contexto</div><div class="tag-grid">' +
      renderTags(c.tags.contexto, "ctx") + "</div>";
  }
  if (c.tags.suplementos.length > 0) {
    secciones += '<div class="tag-section-title">Suplementos</div><div class="tag-grid">' +
      renderTags(c.tags.suplementos, "purple") + "</div>";
  }

  var nota = c.nota
    ? '<div class="note">' + c.nota + "</div>"
    : "";

  var supIndicators = "";
  if (c.tags.suplementos && c.tags.suplementos.length > 0) {
    var supMap = {
      doublex_media:    { label: "2X",    color: "#fbbf24" },
      doublex_completa: { label: "2X·2",  color: "#fb923c" },
      omega3_capsula:   { label: "Ω3",    color: "#60a5fa" },
      menjurje:         { label: "🧉 MNJ", color: "#4ade80" }
    };
    supIndicators = c.tags.suplementos.map(function(s) {
      var m = supMap[s] || { label: s, color: "#6b7280" };
      return '<span style="display:inline-flex;align-items:center;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.04em;background:' + m.color + '22;border:1px solid ' + m.color + '55;color:' + m.color + ';margin-left:6px;flex-shrink:0;">' + m.label + '</span>';
    }).join("");
  }

  return '<div class="meal-card">' +
    '<div class="meal-header" onclick="toggle(this)">' +
      '<div class="meal-header-left">' +
        '<div class="meal-icon">' + c.icono + "</div>" +
        '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:2px;">' +
          '<div class="meal-title">' + c.titulo + '</div>' +
          supIndicators +
        '</div>' +
        '<div class="meal-time">' + c.hora + "</div>" +
      "</div>" +
      '<div class="meal-chevron">&#x25BC;</div>' +
    "</div>" +
    '<div class="meal-body">' +
      (alimentos ? '<div class="food-list">' + alimentos + "</div>" : "") +
      nota +
      secciones +
    "</div>" +
  "</div>";
}

var appState = { view: "dia", diaId: null };
var CAL_META = { mes: "Abril 2026", primerOffset: 2, totalDias: 30, anio: 2026, mesNum: 4 };

var CAL_MESES = [
  { mes: "Abril 2026",  primerOffset: 2, totalDias: 30, anio: 2026, mesNum: 4 },
  { mes: "Mayo 2026",   primerOffset: 4, totalDias: 31, anio: 2026, mesNum: 5 }
];
var calMesIdx = 0;

function calNavMes(dir) {
  var newIdx = calMesIdx + dir;
  if (newIdx < 0 || newIdx >= CAL_MESES.length) return;
  calMesIdx = newIdx;
  CAL_META.mes = CAL_MESES[calMesIdx].mes;
  CAL_META.primerOffset = CAL_MESES[calMesIdx].primerOffset;
  CAL_META.totalDias = CAL_MESES[calMesIdx].totalDias;
  CAL_META.anio = CAL_MESES[calMesIdx].anio;
  CAL_META.mesNum = CAL_MESES[calMesIdx].mesNum;
  renderCalendar();
  var prev = document.getElementById("cal-prev");
  var next = document.getElementById("cal-next");
  if (prev) prev.disabled = (calMesIdx === 0);
  if (next) next.disabled = (calMesIdx === CAL_MESES.length - 1);
}

function buildDiasConData() {
  var map = {};
  DATA.dias.forEach(function(d) {
    var parts = d.fecha.split("-");
    var mesNum = parseInt(parts[1], 10);
    var diaNum = parseInt(parts[2], 10);
    if (mesNum === CAL_META.mesNum) {
      map[diaNum] = d.id;
    }
  });
  return map;
}

function renderCalendar() {
  var diasConData = buildDiasConData();
  var dayNames = ["L","M","X","J","V","S","D"];
  var grid = document.getElementById("cal-grid");
  var label = document.getElementById("cal-mes-label");
  var calWrap = document.getElementById("cal-wrap");

  calWrap.style.display = (appState.view === "dia") ? "" : "none";
  if (appState.view !== "dia") return;

  label.textContent = CAL_META.mes;

  var html = dayNames.map(function(d) {
    return '<div class="cal-dayname">' + d + '</div>';
  }).join("");

  for (var i = 0; i < CAL_META.primerOffset; i++) {
    html += '<div class="cal-day"></div>';
  }

  for (var d = 1; d <= CAL_META.totalDias; d++) {
    var diaId = diasConData[d];
    var isSelected = diaId && appState.diaId === diaId;
    var cls = "cal-day" + (diaId ? " has-data" : "") + (isSelected ? " selected" : "");
    var click = diaId ? ' onclick="selectDia(\'' + diaId + '\')"' : "";
    html += '<div class="' + cls + '"' + click + '>' + d + '</div>';
  }

  grid.innerHTML = html;
}

function updateSecNav() {
  var pills = document.querySelectorAll(".sec-pill");
  pills.forEach(function(p) {
    p.classList.toggle("active", p.dataset.view === appState.view);
  });
}

function updateView() {
  updateSecNav();
  renderCalendar();
  var app = document.getElementById("app");

  if (appState.view === "dia") {
    if (!appState.diaId) {
      app.innerHTML = '<div class="empty-state"><span>📅</span>Selecciona un día en el calendario</div>';
      return;
    }
    var dia = DATA.dias.find(function(d) { return d.id === appState.diaId; });
    app.innerHTML = dia ? renderDia(dia) : '<div class="empty-state"><span>🔍</span>Día no encontrado</div>';

  } else if (appState.view === "semana" || appState.view === "mes") {
    app.innerHTML = renderResumen() + renderAlertas() + renderConsejos();
  } else if (appState.view === "contexto") {
    app.innerHTML = renderContexto();
  } else if (appState.view === "alertas") {
    app.innerHTML = renderAlertas();
  } else if (appState.view === "consejos") {
    app.innerHTML = renderConsejos();
  }
}

function selectDia(id) {
  appState.view = "dia";
  appState.diaId = id;
  updateView();
  document.getElementById("cal-prev").disabled = true;
  setTimeout(function() {
    var app = document.getElementById("app");
    if (app) app.scrollIntoView({ behavior: "smooth", block: "start" });
  }, 50);
}

function setView(v) {
  appState.view = v;
  appState.diaId = null;
  updateView();
  setTimeout(function() {
    var app = document.getElementById("app");
    if (app) app.scrollIntoView({ behavior: "smooth", block: "start" });
  }, 50);
}

// ─────────────────────────────────────────────
//  EXPORT CSV — Corregido para evitar error de sintaxis
// ─────────────────────────────────────────────
function exportCSV() {
  var rows = [["Fecha","Día","Comida","Hora","Alimentos","Tags cubierto","Tags atención","Tags contexto","Suplementos","Nota"]];
  DATA.dias.forEach(function(dia) {
    dia.comidas.forEach(function(c) {
      rows.push([
        dia.fecha,
        dia.etiqueta,
        c.titulo,
        c.hora,
        c.alimentos.join(" | "),
        c.tags.cubierto.map(labelTag).join(" | "),
        c.tags.atencion.map(labelTag).join(" | "),
        c.tags.contexto.map(labelTag).join(" | "),
        c.tags.suplementos.map(labelTag).join(" | "),
        c.nota || ""
      ]);
    });
  });
  var csv = rows.map(function(r) {
    return r.map(function(cell) {
      return '"' + String(cell).replace(/"/g, '""') + '"';
    }).join(",");
  }).join("\n");
  
  var bom = "\uFEFF";
  var blob = new Blob([bom + csv], {type: "text/csv;charset=utf-8;"});
  var url = URL.createObjectURL(blob);
  var el = document.createElement("a");
  el.href = url;
  el.download = "registro_nutricional_s" + String(DATA.meta.semana).padStart(2,"0") + ".csv";
  document.body.appendChild(el);
  el.click();
  document.body.removeChild(el);
  URL.revokeObjectURL(url);
}

function toggle(h) { h.parentElement.classList.toggle("open"); }

window.onload = async function() {
  render();

  var pills = document.querySelectorAll(".sec-pill");
  pills.forEach(function(p) {
    p.onclick = function() { setView(p.dataset.view); };
  });

  var ok = await cargarRegistros();
  if (!ok || DATA.dias.length === 0) return;

  var ultimo = DATA.dias[DATA.dias.length - 1];
  appState.diaId = ultimo.id;
  appState.view = "dia";
  updateView();
};
</script>
